name: CI-CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: case-study7

jobs:

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Unit Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests found."
          fi

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  docker-push:
    name: Push Docker Image
    needs: build-test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy Spark Job
    needs: docker-push
    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Kubernetes Cluster
        shell: powershell
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Delete Previous Job
        shell: powershell
        run: |
          kubectl delete job case-study7-job --ignore-not-found=true

      - name: Wait for Cleanup
        shell: powershell
        run: |
          Start-Sleep -Seconds 5

      - name: Update deployment.yaml
        shell: powershell
        run: |
          $image = "${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          (Get-Content job.yaml) `
            -replace 'image:.*', "image: $image" |
            Set-Content deployment.yaml

      - name: Deploy Spark Job
        shell: powershell
        run: |
          kubectl apply -f deployment.yaml

      - name: Wait for Job Completion
        shell: powershell
        run: |
          kubectl wait --for=condition=complete job/case-study7-job --timeout=900s

      - name: Show Job Status
        shell: powershell
        run: |
          kubectl get jobs
          kubectl get pods

      - name: Display Spark Logs
        shell: powershell
        run: |
          $pod = kubectl get pods -l job-name=case-study7-job -o jsonpath="{.items[0].metadata.name}"
          kubectl logs $pod
