name: CI-CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: case-study7

jobs:

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Unit Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests found."
          fi

      - name: Build Docker Image
        run: |
          docker build -t archie650/case-study7:${{ github.sha }} .
          docker tag archie650/case-study7:${{ github.sha }} archie650/case-study7:latest

  docker-push:
    name: Push Docker Image
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t archie650/case-study7:${{ github.sha }} .
          docker tag archie650/case-study7:${{ github.sha }} archie650/case-study7:latest

      - name: Push Docker Images
        run: |
          docker push archie650/case-study7:${{ github.sha }}
          docker push archie650/case-study7:latest

  deploy:
    name: Deploy to Kubernetes
    needs: docker-push
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Kubernetes Cluster
        shell: powershell
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Update deployment.yaml
        shell: powershell
        run: |
          (Get-Content deployment.yaml) `
            -replace 'image:.*', 'image: archie650/case-study7:latest' |
            Set-Content deployment.yaml

      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          kubectl apply -f deployment.yaml

      - name: Wait for Rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/case-study7

      - name: Verify Deployment
        shell: powershell
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get services
