name: Smart Energy Insights CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: smart-energy-insights

jobs:

  build-test-push:
    name: Build, Test & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest

      - name: Run Unit Tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests found. Skipping..."
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Kubernetes
    needs: build-test-push
    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Kubernetes Cluster
        shell: powershell
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Update Deployment Image
        shell: powershell
        run: |
          $image="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

          (Get-Content k8s/deployment.yaml) `
          -replace 'image:.*', "        image: $image" |
          Set-Content k8s/deployment.yaml

      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Restart Deployment
        shell: powershell
        run: |
          kubectl rollout restart deployment smart-energy-insights

      - name: Wait for Rollout
        shell: powershell
        run: |
          kubectl rollout status deployment smart-energy-insights --timeout=300s

      - name: Verify Deployment
        shell: powershell
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get svc

      - name: Display Application URL
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "Application URL:"
          Write-Host "http://localhost:30001"